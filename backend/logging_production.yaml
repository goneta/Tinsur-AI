disable_existing_loggers: false
formatters:
  detailed:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(funcName)s:%(lineno)d - %(message)s'
  standard:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    level: WARNING
    stream: ext://sys.stdout
  error_file:
    backupCount: 10
    class: logging.handlers.RotatingFileHandler
    encoding: utf-8
    filename: /var/log/tinsur-ai/error.log
    formatter: detailed
    level: ERROR
    maxBytes: 10485760
  file:
    backupCount: 10
    class: logging.handlers.RotatingFileHandler
    encoding: utf-8
    filename: /var/log/tinsur-ai/app.log
    formatter: detailed
    level: INFO
    maxBytes: 10485760
loggers:
  app:
    handlers:
    - console
    - file
    - error_file
    level: INFO
    propagate: false
  sqlalchemy:
    handlers:
    - file
    level: WARNING
    propagate: false
  uvicorn:
    handlers:
    - console
    - file
    level: INFO
root:
  handlers:
  - console
  - file
  level: WARNING
version: 1
